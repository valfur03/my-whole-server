# Emits node-exporter textfile-collector metrics about each borgmatic run,
# labelled by the config file processed.
#
# Uses legacy `after_actions` / `on_error` hooks: the new-style top-level
# `commands:` list does not exist in borgmatic 1.9.14's schema, and the root
# is `additionalProperties: false`, so any unknown key fails parsing.
#
# - after_actions fires only on success (run_actions has no surrounding
#   try/except, so a raising action skips it).
# - on_error fires only on failure.
# Both interpolate {configuration_filename} via
# borgmatic/hooks/command.py:execute_hook. They fire per (config x repo),
# so the .prom file may be rewritten N times per config; the script is
# idempotent.
after_actions:
    - sh /scripts/prometheus-textfile.sh success "{configuration_filename}"
on_error:
    - sh /scripts/prometheus-textfile.sh failure "{configuration_filename}"
