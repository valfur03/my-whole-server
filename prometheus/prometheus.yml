global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
- job_name: "transmission"
  static_configs:
    - targets: ["transmission-exporter:19091"]
- job_name: "node"
  static_configs:
    - targets: ["node-exporter:9100"]
- job_name: "traefik"
  static_configs:
    - targets: ["reverse-proxy:8080"]
- job_name: "cadvisor"
  static_configs:
    - targets: ["cadvisor:8080"]
- job_name: "nextcloud-mysqld"
  static_configs:
    - targets: ["nextcloud-mysqld-exporter:9104"]
- job_name: "nextcloud-redis"
  static_configs:
    - targets: ["nextcloud-redis-exporter:9121"]
- job_name: "sonarr"
  static_configs:
    - targets: ["sonarr-exporter:9707"]
- job_name: "radarr"
  static_configs:
    - targets: ["radarr-exporter:9708"]
- job_name: "frps"
  static_configs:
    - targets: ["frps:7500"]
- job_name: "prometheus"
  static_configs:
    - targets: ["prometheus:9090"]
- job_name: "loki"
  static_configs:
    - targets: ["loki:3100"]
- job_name: "alloy-logs"
  static_configs:
    - targets: ["alloy-logs:12345"]
- job_name: "otel-collector"
  static_configs:
    - targets: ["otel-collector:12345"]
- job_name: "jaeger"
  static_configs:
    - targets: ["jaeger:14269"]
