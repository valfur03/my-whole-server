api:
  insecure: false
  dashboard: true
  debug: false

entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
  https:
    address: ":443"
  # Internal entrypoint for /ping and /metrics. Not routed externally — only
  # reachable from the proxy network for health probes and Prometheus scraping.
  traefik:
    address: ":8080"

ping:
  entryPoint: traefik

certificatesResolvers:
  letsencrypt:
    acme:
      caServer: https://acme-v02.api.letsencrypt.org/directory
      storage: /etc/traefik/acme/acme.json
      dnsChallenge:
        provider: ovh

providers:
  docker:
    endpoint: "tcp://socket-proxy:2375"
    exposedbydefault: false
    network: my-whole-server_proxy

tracing:
  otlp:
    http:
      endpoint: http://jaeger:4318/v1/traces

metrics:
  prometheus:
    addRoutersLabels: true
    addServicesLabels: true
    addEntryPointsLabels: true
