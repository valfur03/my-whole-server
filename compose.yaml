  OVH_APPLICATION_SECRET:
    file: ${SECRETS_DIR:-./}traefik/secrets/OVH_APPLICATION_SECRET
  OVH_CONSUMER_KEY:
    file: ${SECRETS_DIR:-./}traefik/secrets/OVH_CONSUMER_KEY
