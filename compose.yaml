      POSTGRES_PASSWORD: ${WEEKLY_MONEY_DATABASE_PASSWORD}
    volumes:
      - weekly-money-database:/var/lib/postgresql/data
    networks:
      - weekly-money-backend
    restart: unless-stopped

  weekly-money:
    image: ghcr.io/valfur03/weekly-money:main
    depends_on:
      - weekly-money-database
    environment:
      NOTION_ACCESS_TOKEN: ${NOTION_ACCESS_TOKEN}
      NOTION_PRODUCTS_DATASOURCE_ID: ${NOTION_PRODUCTS_DATASOURCE_ID}
      NOTION_PORTFOLIO_DATASOURCE_ID: ${NOTION_PORTFOLIO_DATASOURCE_ID}
      NOTION_PORTFOLIO_ACCOUNT_ID: ${NOTION_PORTFOLIO_ACCOUNT_ID}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_USER_ID: ${DISCORD_USER_ID}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
      DATABASE_HOST: weekly-money-database
      DATABASE_USER: weekly-money
      DATABASE_NAME: weekly-money
      DATABASE_PASSWORD: ${WEEKLY_MONEY_DATABASE_PASSWORD}
      BASE_DOMAIN: weekly-money.${BASE_DOMAIN}
      LOG_LEVEL: debug
    networks:
      - proxy
      - weekly-money-backend
    labels:
      traefik.http.routers.weekly-money.rule: Host(`weekly-money.${BASE_DOMAIN}`)
      traefik.http.routers.weekly-money.tls: true
      traefik.http.routers.weekly-money.tls.certresolver: letsencrypt
      traefik.http.services.weekly-money.loadbalancer.server.port: 3000
      traefik.enable: true
    restart: unless-stopped

# ============================================================================ #
# ================================= WIREGUARD ================================ #
# ============================================================================ #
  adguard:
    image: adguard/adguardhome:v0.107.76@sha256:7157eb1dc3b26c7af1d6898759a7b3f7d0fa09891fbd2d3caa6abc1057a9179b
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf
    networks:
      proxy:
      AAA-vpn:
        ipv4_address: "10.8.1.3"
    labels:
      traefik.http.routers.adguard.rule: Host(`adguard.${BASE_DOMAIN}`)
      traefik.http.routers.adguard.tls: true
      traefik.http.routers.adguard.tls.certresolver: letsencrypt
      traefik.http.services.adguard.loadbalancer.server.port: 80
      traefik.enable: true
    restart: unless-stopped
  wireguard:
    image: ghcr.io/wg-easy/wg-easy:14@sha256:5f26407fd2ede54df76d63304ef184576a6c1bb73f934a58a11abdd852fab549
    depends_on:
      - reverse-proxy
    ports:
      - 51820:51820/udp
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
      net.ipv4.ip_forward: 1
    environment:
      WG_HOST: "${HOST_IP}"
      WG_DEFAULT_DNS: "10.8.1.3"
    volumes:
      - wireguard:/etc/wireguard
    networks:
      AAA-vpn:
        ipv4_address: "10.8.1.2"
      proxy:
    labels:
      traefik.http.routers.wireguard.rule: Host(`wireguard.${BASE_DOMAIN}`)
      traefik.http.routers.wireguard.tls: true
      traefik.http.routers.wireguard.tls.certresolver: letsencrypt
      traefik.http.routers.wireguard.middlewares: authelia@docker
      traefik.http.services.wireguard.loadbalancer.server.port: 51821
      traefik.enable: true
    restart: unless-stopped

