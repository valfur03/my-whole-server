name: my-whole-server
services:
# ============================================================================ #
# ================================ AUTHELIA ================================== #
# ============================================================================ #
  authelia-database:
    image: postgres:16.1-alpine3.17@sha256:7e26cdee39d74f2f8cd527dc3bf8e675d008a2120fab3aded96d546ff12c9519
    restart: unless-stopped
    environment:
      POSTGRES_DB: authelia
      POSTGRES_USER: authelia
      POSTGRES_PASSWORD_FILE: /run/secrets/AUTHELIA_STORAGE_PASSWORD
    volumes:
      - authelia-database:/var/lib/postgresql/data
    networks:
      - authelia-backend
    secrets:
      - AUTHELIA_STORAGE_PASSWORD

  authelia-redis:
    image: redis:7.2-alpine3.18@sha256:3ce533b2b057f74b235d1d8697ae08b1b6ff0a5e16827ea6a377b6365693c7ed
    restart: unless-stopped
    networks:
      - authelia-backend

  authelia:
    build: authelia
    depends_on:
      - authelia-database
      - authelia-redis
      - ldap
    environment:
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_ADDITIONAL_USERS_DN: ou=${LDAP_USER_DC}
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_ADDITIONAL_GROUPS_DN: ou=${LDAP_GROUP_DC}
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_BASE_DN: ${LDAP_BASE_DN}
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD_FILE: /run/secrets/LDAP_ADMIN_PASSWORD
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_USER: ${AUTHELIA_LDAP_USER}
      AUTHELIA_DEFAULT_REDIRECTION_URL: https://${BASE_DOMAIN}
      AUTHELIA_JWT_SECRET_FILE: /run/secrets/AUTHELIA_JWT_SECRET
      AUTHELIA_NOTIFIER_SMTP_USERNAME: ${SMTP_USERNAME}
      AUTHELIA_NOTIFIER_SMTP_SENDER: "${AUTHELIA_SYSTEM_EMAIL_SENDER} <${AUTHELIA_SYSTEM_EMAIL}>"
      AUTHELIA_NOTIFIER_SMTP_PASSWORD_FILE: /run/secrets/SMTP_PASSWORD
      AUTHELIA_NOTIFIER_SMTP_HOST: ${SMTP_HOST}
      AUTHELIA_NOTIFIER_SMTP_TLS_SERVER_NAME: ${SMTP_HOST}
      AUTHELIA_SESSION_DOMAIN: ${BASE_DOMAIN}
      AUTHELIA_SESSION_SECRET_FILE: /run/secrets/AUTHELIA_SESSION_SECRET
      AUTHELIA_STORAGE_POSTGRES_PASSWORD_FILE: /run/secrets/AUTHELIA_STORAGE_PASSWORD
      BASE_DOMAIN: ${BASE_DOMAIN}
      HOST_IP: ${HOST_IP}
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: /run/secrets/AUTHELIA_STORAGE_ENCRYPTION_KEY
    networks:
      - authelia-backend
      - ldap-backend
      - proxy
    secrets:
      - AUTHELIA_JWT_SECRET
      - AUTHELIA_SESSION_SECRET
      - AUTHELIA_STORAGE_PASSWORD
      - AUTHELIA_STORAGE_ENCRYPTION_KEY
      - LDAP_ADMIN_PASSWORD
      - SMTP_PASSWORD
    expose:
      - 9091
    labels:
      traefik.http.routers.authelia.rule: Host(`auth.${BASE_DOMAIN}`)
      traefik.http.routers.authelia.tls: true
      traefik.http.routers.authelia.tls.certresolver: letsencrypt
      traefik.http.services.authelia.loadbalancer.server.port: 9091
      traefik.enable: true
    restart: unless-stopped
# ============================================================================ #
# ================================= BORGMATIC ================================ #
# ============================================================================ #
  borgmatic:
    image: ghcr.io/borgmatic-collective/borgmatic:1.9.14@sha256:70bca87df9d84d45f50b4c56f55bb0f20e21341faacd0a07f89e43e3da50cd9e
    environment:
      BORG_PASSPHRASE_FILE: /run/secrets/BORGMATIC_ENCRYPTION_PASSPHRASE
      BACKUP_CRON: "0 2 * * *"
      TZ: Europe/Paris
    env_file:
      - ./borgmatic/envs/databases.sops.env
      - ./borgmatic/envs/borgbase.sops.env
    volumes:
      - borg-config:/root/.config/borg
      - borg-cache:/root/.cache/borg
      - ./borgmatic/config:/etc/borgmatic.d
      - ./borgmatic/scripts:/scripts:ro
      - adguard-conf:/volumes/adguard-conf
      - nextcloud-data:/volumes/nextcloud-data
      - plex-config:/volumes/plex-config
#      - synapse-data:/volumes/synapse-data
      - vaultwarden-data:/volumes/vaultwarden-data
      - /backup/local/borg/docker:/backup/local
      - /var/run/docker.sock:/var/run/docker.sock
      - node-textfile-collector:/var/lib/node_exporter/textfile_collector
    networks:
      - authelia-backend
      - nextcloud-backend
#      - synapse-backend
    secrets:
      - AUTHELIA_JWT_SECRET
      - AUTHELIA_SESSION_SECRET
      - AUTHELIA_STORAGE_ENCRYPTION_KEY
      - AUTHELIA_STORAGE_PASSWORD
      - BORGMATIC_ENCRYPTION_PASSPHRASE
      - LDAP_ADMIN_PASSWORD
      - NEXTCLOUD_STORAGE_PASSWORD
      - SMTP_PASSWORD
#      - SYNAPSE_STORAGE_PASSWORD
      - VAULTWARDEN_ADMIN_TOKEN
      - OVH_APPLICATION_KEY
      - OVH_APPLICATION_SECRET
      - OVH_CONSUMER_KEY
      - DOCO_CD_GIT_ACCESS_TOKEN
      - DOCO_CD_WEBHOOK_SECRET
      - DOCO_CD_SOPS_AGE_KEY
      - source: BORGMATIC_SSH_PRIVATE_KEY
        target: /root/.ssh/id_rsa
        mode: 0400
      - source: BORGMATIC_SSH_KNOWN_HOSTS
        target: /root/.ssh/known_hosts
        mode: 0400
    restart: unless-stopped
# ============================================================================ #
# ==================================== FRP =================================== #
# ============================================================================ #
  frps:
    image: snowdreamtech/frps:alpine@sha256:9266755999eea2ce3f4c0f41eeaf62b3955b2938582fdeaa6fcd8513a7be10b0
    command: -c /etc/frps/frps.toml
    environment:
      FRP_AUTH_TOKEN: ${FRP_AUTH_TOKEN}
    volumes:
      - ./frps/frps.toml:/etc/frps/frps.toml:ro
    ports:
      - 7000:7000
    networks:
      - proxy
      - metrics
    labels:
      traefik.http.routers.frps.rule: HostRegexp(`^.+-tunnel\.${BASE_DOMAIN}$`)
      traefik.http.routers.frps.tls: true
      traefik.http.routers.frps.tls.certresolver: letsencrypt
      traefik.http.services.frps.loadbalancer.server.port: 8080
      traefik.enable: true
    restart: unless-stopped
# ============================================================================ #
# ================================== GRAFANA ================================= #
# ============================================================================ #
  prometheus:
    build: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-remote-write-receiver
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
    volumes:
      - prometheus-data:/prometheus
    networks:
      - proxy #delete
      - metrics
      - seedbox-metrics
    labels: # delete
      traefik.http.routers.prom.rule: Host(`prom.${BASE_DOMAIN}`)
      traefik.http.routers.prom.tls: true
      traefik.http.routers.prom.tls.certresolver: letsencrypt
      traefik.http.services.prom.loadbalancer.server.port: 9090
      traefik.http.routers.prom.middlewares: authelia@docker
      traefik.enable: true
    restart: unless-stopped
  grafana:
    image: grafana/grafana:11.6.5@sha256:0434860e36acddf5cbda1bb40666247ab54e66080b1425790a8e61dda6971181
    depends_on:
      - prometheus
    environment:
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/00-home/server-health.json
      GF_PLUGINS_PREINSTALL: grafana-lokiexplore-app@2.0.4
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - metrics
      - proxy
    restart: unless-stopped
    labels:
      traefik.http.routers.grafana.rule: Host(`metrics.${BASE_DOMAIN}`)
      traefik.http.routers.grafana.tls: true
      traefik.http.routers.grafana.tls.certresolver: letsencrypt
      traefik.http.services.grafana.loadbalancer.server.port: 3000
      traefik.enable: true
  node-exporter:
    image: prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run|tmp)($$|/)"
      - "--collector.textfile.directory=/var/lib/node_exporter/textfile_collector"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - node-textfile-collector:/var/lib/node_exporter/textfile_collector:ro
    networks:
      - metrics
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0@sha256:b04a9fef4fa086a02fc7fcd8dcdbc4b7b35cc30cdee860fdc6a19dd8b208d63e
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - metrics
      - proxy
      - seedbox-metrics
    restart: unless-stopped
  cadvisor:
    image: ghcr.io/google/cadvisor:v0.57.0@sha256:e75bdb03b74b0b6995f208f166fead2e6e555dde73e44200113bb26f41b1981d
    privileged: true
    command:
      - --housekeeping_interval=15s
      - --docker_only=true
      - --store_container_labels=false
      - --whitelisted_container_labels=com.docker.compose.project,com.docker.compose.service
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - metrics
    restart: unless-stopped
# ============================================================================ #
# =================================== LDAP =================================== #
# ============================================================================ #
  ldap:
    image: osixia/openldap:1.5.0@sha256:18742e9c449c9c1afe129d3f2f3ee15fb34cc43e5f940a20f3399728f41d7c28
    networks:
      - ldap-backend
    environment:
      LDAP_ORGANISATION: ${ORGANISATION_NAME}
      LDAP_DOMAIN: ${BASE_DOMAIN}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_ADMIN_PASSWORD_FILE: /run/secrets/LDAP_ADMIN_PASSWORD
    volumes:
      - ldap-database:/var/lib/ldap
      - ldap-config:/etc/ldap/slapd.d
    secrets:
      - LDAP_ADMIN_PASSWORD
    restart: unless-stopped

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0@sha256:d112b82be1336f91e028b0348755133fda333992355b533419355a65c32ff9ad
    depends_on:
      - ldap
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
      PHPLDAPADMIN_HTTPS: false
    networks:
      - ldap-backend
      - proxy
    labels:
      traefik.http.routers.ldap.rule: Host(`ldap.${BASE_DOMAIN}`)
      traefik.http.routers.ldap.tls: true
      traefik.http.routers.ldap.tls.certresolver: letsencrypt
      traefik.http.routers.ldap.middlewares: authelia@docker
      traefik.enable: true
    restart: unless-stopped
# ============================================================================ #
# ================================= NEXCTLOUD ================================ #
# ============================================================================ #
  nextcloud-database:
    image: mariadb:11.3-jammy@sha256:e101f9db31916a5d4d7d594dd0dd092fb23ab4f499f1d7a7425d1afd4162c4bc
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW --skip-innodb-read-only-compressed
    volumes:
      - nextcloud-database:/var/lib/mysql
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: 1
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD_FILE: /run/secrets/NEXTCLOUD_STORAGE_PASSWORD
    networks:
      - nextcloud-backend
    secrets:
      - NEXTCLOUD_STORAGE_PASSWORD
    restart: unless-stopped

  nextcloud-redis:
    image: redis:7.2-alpine3.18@sha256:3ce533b2b057f74b235d1d8697ae08b1b6ff0a5e16827ea6a377b6365693c7ed
    restart: unless-stopped
    networks:
      - nextcloud-backend

  nextcloud-mysqld-exporter:
    build: mysqld-exporter
    depends_on:
      - nextcloud-database
    networks:
      - nextcloud-backend
      - metrics
    secrets:
      - NEXTCLOUD_STORAGE_PASSWORD
    restart: unless-stopped

  nextcloud-redis-exporter:
    image: oliver006/redis_exporter:v1.83.0-alpine@sha256:7643b705adca0ef5c700cae28cfd8798c3d3b653ef17096084359d17b70ea5ca
    depends_on:
      - nextcloud-redis
    environment:
      REDIS_ADDR: redis://nextcloud-redis:6379
    networks:
      - nextcloud-backend
      - metrics
    restart: unless-stopped

  nextcloud-app:
    image: nextcloud:33.0.3-fpm@sha256:f19148bd5c7f3a59b1dd848b8a70cd613640251d5e322964fa0c3356249cece2
    depends_on:
      - nextcloud-database
      - nextcloud-redis
    volumes:
      - nextcloud-data:/var/www/html
      - /data/media:/media:ro
    environment:
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_HOST: nextcloud-database
      MYSQL_PASSWORD_FILE: /run/secrets/NEXTCLOUD_STORAGE_PASSWORD
      REDIS_HOST: nextcloud-redis
      NEXTCLOUD_TRUSTED_DOMAINS: cloud.${BASE_DOMAIN} nextcloud-web
      TRUSTED_PROXIES: reverse-proxy
    networks:
      - nextcloud-backend
    secrets:
      - NEXTCLOUD_STORAGE_PASSWORD
    restart: unless-stopped

  nextcloud-web:
    build: nextcloud
    depends_on:
      - nextcloud-app
    volumes:
      - nextcloud-data:/var/www/html
      - /data/media:/media:ro
    networks:
      - nextcloud-backend
      - proxy
    labels:
      traefik.http.routers.nextcloud.rule: Host(`cloud.${BASE_DOMAIN}`)
      traefik.http.routers.nextcloud.tls: true
      traefik.http.routers.nextcloud.tls.certresolver: letsencrypt
      traefik.http.services.nextcloud.loadbalancer.server.port: 80
      traefik.enable: true
    restart: unless-stopped

# ============================================================================ #
# =================================== OTEL =================================== #
# ============================================================================ #
  tempo:
    image: grafana/tempo:2.10.5@sha256:ee21727732c7a7199cb71c3eee9153bbf23f9b0b87619f0555a0cf21a67f1a33
    user: "0"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./otel/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - metrics
      - seedbox-metrics
    restart: unless-stopped

  otel-collector:
    image: grafana/alloy:v1.16.1@sha256:51aeb9d829239345070619dad3edd6873186f913c84f45b365b74574fcb38ec0
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    depends_on:
      - tempo
    volumes:
      - ./otel/collector/config.alloy:/etc/alloy/config.alloy:ro
      - otel-collector-data:/var/lib/alloy/data
    networks:
      - proxy
      - seedbox-metrics
    labels:
      traefik.http.routers.otel-http-collector.rule: Host(`http.collector.traces.${BASE_DOMAIN}`)
      traefik.http.routers.otel-http-collector.tls: true
      traefik.http.routers.otel-http-collector.tls.certresolver: letsencrypt
      traefik.http.routers.otel-http-collector.middlewares: authelia@docker
      traefik.http.services.otel-http-collector.loadbalancer.server.port: 4318
      traefik.enable: true
    restart: unless-stopped

# ============================================================================ #
# ==================================== LOKI ================================== #
# ============================================================================ #
  loki:
    image: grafana/loki:3.7.2@sha256:191d4fdfb7264f16989f0a57f320872620a5a7c2ceeec6229212c4190ec49b86
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks:
      - metrics
    restart: unless-stopped

  alloy-logs:
    image: grafana/alloy:v1.16.1@sha256:51aeb9d829239345070619dad3edd6873186f913c84f45b365b74574fcb38ec0
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    depends_on:
      - loki
      - socket-proxy
    volumes:
      - ./loki/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-logs-data:/var/lib/alloy/data
    networks:
      - metrics
      - traefik
    restart: unless-stopped

# ============================================================================ #
# ================================== SEEDBOX ================================= #
# ============================================================================ #
  vpn:
    image: qmcgaw/gluetun:v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    secrets:
      - source: SEEDBOX_WIREGUARD_CONFIG
        target: /gluetun/wireguard/wg0.conf
        mode: 0400
    logging:
      options:
        max-size: "2m"
        max-file: "3"
    environment:
      VPN_SERVICE_PROVIDER: custom
      VPN_TYPE: wireguard
      TZ: Europe/Paris
    networks:
      - proxy
      - seedbox-indexer
      - seedbox-metrics
      - seedbox-torrenting
    ports:
      - 53490:34095
    labels:
      traefik.http.routers.transmission.rule: Host(`transmission.${BASE_DOMAIN}`)
      traefik.http.routers.transmission.service: transmission
      traefik.http.routers.transmission.tls: true
      traefik.http.routers.transmission.tls.certresolver: letsencrypt
      traefik.http.services.transmission.loadbalancer.server.port: 9091
      traefik.http.routers.transmission.middlewares: authelia@docker
      traefik.http.routers.jackett.rule: Host(`jackett.${BASE_DOMAIN}`)
      traefik.http.routers.jackett.service: jackett
      traefik.http.services.jackett.loadbalancer.server.port: 9117
      traefik.http.routers.jackett.tls: true
      traefik.http.routers.jackett.tls.certresolver: letsencrypt
      traefik.http.routers.jackett.middlewares: authelia@docker
      traefik.enable: true
    restart: unless-stopped

  transmission:
    image: linuxserver/transmission:4.1.1@sha256:7d1f96f26f433d5bfa518f6392021e17fc74a7eb0322190746981143644ce29e
    depends_on:
      vpn:
        condition: service_healthy
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    network_mode: "service:vpn"
    volumes:
     - /data:/data
     - transmission-config:/config
    restart: unless-stopped

  fleischel:
    image: ghcr.io/valfur03/fleischel@sha256:f0dc6fefd24e585744a22a15466f0564d071df3a8c590f649a684d75d4b194d7
    networks:
      - seedbox-torrenting
    environment:
      TRANSMISSION_HOST: vpn
      LOG_LEVEL: debug
    restart: unless-stopped

  jackett:
    image: lscr.io/linuxserver/jackett:0.24.1440@sha256:cdea5d3209a6ab1fb8eb954ec0b8169b7d54274617f42bf5c74f22a92075755f
    depends_on:
      vpn:
        condition: service_healthy
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - jackett-config:/config
      - jackett-downloads:/downloads
    network_mode: "service:vpn"
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.12@sha256:ca71add37a9cdbb914c7bd5b06f98bf5d2062848c8de6ac3ee09e69a4c170b27
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Paris
    volumes:
      - sonarr-config:/config
      - /data:/data
    networks:
      - seedbox-indexer
      - proxy
      - seedbox-torrenting
    labels:
      traefik.http.routers.sonarr.rule: Host(`sonarr.${BASE_DOMAIN}`)
      traefik.http.services.sonarr.loadbalancer.server.port: 8989
      traefik.http.routers.sonarr.tls: true
      traefik.http.routers.sonarr.tls.certresolver: letsencrypt
      traefik.http.routers.sonarr.middlewares: authelia@docker, sonarr-auth-header@docker
      traefik.enable: true
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:5.28.0@sha256:b2c7710f6eda0f745e2647783de47e1bb750d838d012bb2dc1df535ee2228c9b
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Paris
    volumes:
      - radarr-config:/config
      - /data:/data
    networks:
      - seedbox-indexer
      - proxy
      - seedbox-torrenting
    labels:
      traefik.http.routers.radarr.rule: Host(`radarr.${BASE_DOMAIN}`)
      traefik.http.services.radarr.loadbalancer.server.port: 7878
      traefik.http.routers.radarr.tls: true
      traefik.http.routers.radarr.tls.certresolver: letsencrypt
      traefik.http.routers.radarr.middlewares: authelia@docker, radarr-auth-header@docker
      traefik.enable: true
    restart: unless-stopped
  sonarr-exporter:
    image: ghcr.io/onedr0p/exportarr:v2.3.0@sha256:af535d94061cf97a52e1661945ffba78c03f9443eae7c0da1a80a5a4be56b520
    command: ["sonarr"]
    depends_on:
      - sonarr
    environment:
      PORT: 9707
      URL: http://sonarr:8989
      APIKEY: ${SONARR_API_KEY}
    networks:
      - seedbox-indexer
      - metrics
    restart: unless-stopped
  radarr-exporter:
    image: ghcr.io/onedr0p/exportarr:v2.3.0@sha256:af535d94061cf97a52e1661945ffba78c03f9443eae7c0da1a80a5a4be56b520
    command: ["radarr"]
    depends_on:
      - radarr
    environment:
      PORT: 9708
      URL: http://radarr:7878
      APIKEY: ${RADARR_API_KEY}
    networks:
      - seedbox-indexer
      - metrics
    restart: unless-stopped
  plex:
    image: lscr.io/linuxserver/plex:1.43.2@sha256:626eb0d52b4522db3be91110a89161be6ccffc0741e9abf0e93aaf4fea98ccb9
    environment:
      PUID: 1000
      PGID: 1000
      VERSION: docker
    volumes:
      - plex-config:/config
      - /data:/data
    networks:
      - proxy
    labels:
      traefik.http.routers.plex.rule: Host(`plex.${BASE_DOMAIN}`)
      traefik.http.services.plex.loadbalancer.server.port: 32400
      traefik.http.routers.plex.tls: true
      traefik.http.routers.plex.tls.certresolver: letsencrypt
      traefik.enable: true
    restart: unless-stopped
  transmission-exporter:
    build: transmission-exporter
    restart: always
    networks:
      - seedbox-metrics
    environment:
      TRANSMISSION_ADDR: http://vpn:9091

  cross-seed:
    image: ghcr.io/cross-seed/cross-seed:6.13.7@sha256:9555dc70f6753fef32d54bfc1ff504899377a6a0b73687f95d58fa27dfa0a7c7
    command: daemon
    user: 1000:1000
    volumes:
      # TODO configuration is generated at runtime
      - cross-seed-config:/config
      - /data:/data
    networks:
      - seedbox-indexer
      - seedbox-torrenting
    restart: unless-stopped

  seerr-database:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: seerr
      POSTGRES_USER: seerr
      POSTGRES_PASSWORD: ${SEERR_DATABASE_PASSWORD}
    volumes:
      - seerr-database:/var/lib/postgresql
    networks:
      - seerr-backend
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:v3.0.0
    init: true
    depends_on:
      - seerr-database
    environment:
      LOG_LEVEL: info
      TZ: Europe/Paris
      PORT: 5055
      DB_TYPE: postgres
      DB_HOST: seerr-database
      DB_PORT: 5432
      DB_USER: seerr
      DB_PASS: ${SEERR_DATABASE_PASSWORD}
      DB_NAME: seerr
    volumes:
      - seerr-config:/app/config
    networks:
      - seerr-backend
      - proxy
      - seedbox-indexer
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      traefik.http.routers.seerr.rule: Host(`seerr.${BASE_DOMAIN}`)
      traefik.http.routers.seerr.tls: true
      traefik.http.routers.seerr.tls.certresolver: letsencrypt
      traefik.http.services.seerr.loadbalancer.server.port: 5055
      traefik.enable: true
    restart: unless-stopped

