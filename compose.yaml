# ================================ WEEKLY-MONEY ============================== #
# ============================================================================ #
  weekly-money-database:
    image: postgres:16.1-alpine3.17@sha256:7e26cdee39d74f2f8cd527dc3bf8e675d008a2120fab3aded96d546ff12c9519
    environment:
      POSTGRES_DB: weekly-money
